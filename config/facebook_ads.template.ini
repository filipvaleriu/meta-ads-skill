# ============================================================
# TEMPLATE - Configurare Meta (Facebook / Instagram) Marketing API
# ============================================================
# UTILIZARE:
#   1. Copiaza acest fisier ca: config/facebook_ads.ini
#   2. Completeaza valorile reale (din Meta for Developers)
#   3. config/facebook_ads.ini e in .gitignore - NU se commit-eaza
# ============================================================
# BEST PRACTICES (DIY cu credentiale sensibile):
#   - Foloseste EXCLUSIV long-lived access token (~60 zile).
#     Token-ul short-lived (~1h) NU se salveaza in fisier - il schimbi
#     pe long-lived imediat: `python meta_ads_costs.py --refresh-token`
#     (scriptul cere short-lived interactiv si scrie access_token-ul nou).
#   - access_token, app_secret si short-lived nu se logheaza si nu se
#     commit-eaza. Daca un token apare intr-un log/share, revoca-l
#     din Meta for Developers.
#   - Verifica periodic data expirarii (`--check-token`). Sub 7 zile
#     ramase - regenereaza.
# ============================================================
# Documentatie:
#   https://developers.facebook.com/docs/marketing-apis/
#   https://developers.facebook.com/docs/facebook-login/guides/access-tokens
# ============================================================

[meta_ads]
# App ID si App Secret din Meta for Developers > App > Settings > Basic
# Necesare DOAR pentru refresh short->long-lived token.
app_id = YOUR_APP_ID
app_secret = YOUR_APP_SECRET

# Long-lived access token (~60 zile) obtinut prin refresh din short-lived.
# NU pune aici token-ul short-lived (expira in ~1h). Ruleaza --refresh-token.
access_token = YOUR_LONG_LIVED_ACCESS_TOKEN

# Ad Account ID cu prefix "act_" (ex: act_1234567890)
ad_account_id = act_0000000000

# Business Manager ID (optional)
business_id =

# Versiunea Graph API (ultima stabila - update periodic)
api_version = v25.0

# Data expirarii access_token (YYYY-MM-DD) - populata de --refresh-token
# pentru reminder. Sub 7 zile ramase => regenereaza.
token_expires_at =

[facebook_pixel]
# Pentru Conversions API / server-side tracking (optional)
pixel_id =
conversion_api_token =
test_event_code =
